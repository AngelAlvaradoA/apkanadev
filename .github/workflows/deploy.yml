name: Deploy Astro to GreenGeeks

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pruebas-astro
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        run: npm run build

      - name: Validate build output
        run: test -f dist/index.html

      - name: Create deployment marker
        run: |
          {
            echo "Project: apkanadev"
            echo "Target: https://apkanadev.com/pruebas-astro/"
            echo "Commit: $GITHUB_SHA"
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            date -u +"Deployed at UTC: %Y-%m-%dT%H:%M:%SZ"
          } > dist/DEPLOY_MARKER.txt

      - name: List dist output
        run: find dist -maxdepth 3 -type f | sort

      - name: Publish dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: production
          publish_dir: ./dist
          force_orphan: true

      - name: Deploy dist to GreenGeeks via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: true
          log-level: verbose
